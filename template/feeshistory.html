{% extends 'base_admin.html' %}

{% block content %}

<div class="container">

<h3 class="mb-4">
Fee History : {{student.name}}
</h3>

<table class="table table-bordered">

<tr>
<th>Date</th>
<th>Amount</th>
</tr>

{% for h in history %}

<tr>
<td>{{h.FEES_DATE}}</td>
<td>₹ {{h.amount}}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
