    <style>
        @keyframes float {

            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

            animation: pulse 3s ease-in-out infinite;
        }
        .course-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
